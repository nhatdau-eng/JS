<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <title>Hiện thị đầu ra</title>
    </head>
    <body> 
        <h2 id="name">Nhật </h2>
        <button onclick="update()">ẤN vào đây</button>
        <script>
            function update (){
              document.getElementById("name").innerText = "Cái tên của thần đồng ";
              alert("Chào mừng bạn ");
              console.log("Người ấn đã hiểu ý của bạn.");
        }
        </script>
    </body>
</html>
